name: pr-bench

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Compare PR performance
    runs-on: namespace-profile-endev-linux-amd64
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: rust
      - uses: jdx/mise-action@b287efda3dc5f4f3c328507653b6617da783ff84 # v4
        with:
          install: false
        env:
          MISE_LOCKED: "1"
      - name: Snapshot baseline benchmarks
        run: |
          if [ -n "$BASE_SHA" ] && git show "$BASE_SHA:benchmarks/results.json" > /tmp/aube-bench-base.json 2>/dev/null; then
            :
          else
            cp benchmarks/results.json /tmp/aube-bench-base.json
          fi
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Benchmark PR head
        run: |
          if [ -n "$HEAD_SHA" ]; then
            git checkout --detach "$HEAD_SHA"
          fi
          cargo build --release
          RESULTS_JSON=/tmp/aube-bench-head.json \
            BENCH_TOOLS=aube,bun,pnpm \
            BENCH_SCENARIOS=gvs-warm,ci-warm,ci-cold \
            BENCH_PHASES=0 \
            RUNS=3 \
            WARMUP=1 \
            BENCH_HERMETIC=1 \
            BENCH_BANDWIDTH=500mbit \
            BENCH_LATENCY=50ms \
            mise x aqua:sharkdp/hyperfine@latest aqua:pnpm/pnpm@latest bun@latest node@24 -- bash benchmarks/bench.sh
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Summarize change
        run: node benchmarks/summarize-results-change.mjs /tmp/aube-bench-base.json /tmp/aube-bench-head.json > /tmp/aube-bench-summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          marker='<!-- aube-pr-bench -->'
          base_short="${BASE_SHA:0:12}"
          head_short="${HEAD_SHA:0:12}"
          {
            printf '%s\n' "$marker"
            cat /tmp/aube-bench-summary.md
            printf '\n'
            printf '_%s vs %s | aube/bun/pnpm | 3 scenarios | 3 runs | 500mbit/50ms | generated by Codex._\n' "$head_short" "$base_short"
          } > /tmp/aube-bench-comment.md

          existing="$(gh api "repos/$GH_REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n1)"
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/$GH_REPO/issues/comments/$existing" \
              --field body="$(cat /tmp/aube-bench-comment.md)"
          else
            gh api --method POST "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
              --field body="$(cat /tmp/aube-bench-comment.md)"
          fi
