name: release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # On every push to main: run `release-plz release`. If the current
  # workspace version has no tag yet (because the release PR was just
  # merged), this tags `aube` as `v<version>`, opens a draft GitHub
  # release, and publishes every workspace crate to crates.io in
  # dependency order. Otherwise it's a no-op.
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    # Two commits landing on main in quick succession must not double-publish.
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUBE_GH_TOKEN }}
          submodules: recursive
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # The `releases` output is an array of every crate that was
      # published, in dependency order. Since aube depends on all
      # 9 other internal crates, it is the LAST entry — and only it
      # has `git_tag_enable = true` in release-plz.toml, so only its
      # `.tag` is meaningful for downstream jobs. Pull that tag out by
      # package name rather than by position.
      - name: Extract aube tag
        id: tag
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          RELEASES_JSON: ${{ steps.release-plz.outputs.releases }}
        run: |
          TAG=$(echo "$RELEASES_JSON" | jq -r '.[] | select(.package_name == "aube") | .tag')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::aube was not in the releases output"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Fetch new tags
        if: steps.release-plz.outputs.releases_created == 'true'
        run: git fetch --tags
      # release-plz creates the draft release before pushing the tag,
      # so the release API briefly has `tag_name: "untagged-<sha>"`.
      # Patch the single aube draft back to its real tag once it
      # lands. (The other 9 crates have `git_release_enable = false`
      # and don't create drafts.)
      - name: Fix draft release tag
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
          REPO: ${{ github.repository }}
          # jq reads `env.TAG` so a tag containing `"` or `\` can't
          # break out of the jq query string.
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "Looking for untagged draft release for tag: $TAG"
          release_id=""
          for attempt in $(seq 1 10); do
            # Exact-match `.name == env.TAG` — `contains` would pick up
            # stale drafts whose name is a superstring (e.g. a leftover
            # `v1.0.0-beta.1` draft when TAG is `v1.0.0`). The draft
            # name is set to "v{{ version }}" in release-plz.toml, so
            # equality is the correct check.
            release_id=$(gh api "repos/$REPO/releases" \
              --jq '.[] | select(.draft and (.tag_name | startswith("untagged-"))) | select(.name == env.TAG) | .id' \
              | head -1) || true
            if [ -n "$release_id" ]; then
              break
            fi
            echo "  Attempt $attempt/10: untagged draft not yet listed, retrying in 5s..."
            sleep 5
          done
          if [ -n "$release_id" ]; then
            echo "Patching draft release $release_id tag_name -> $TAG"
            gh api "repos/$REPO/releases/$release_id" --method PATCH --field tag_name="$TAG"
          else
            echo "::warning::No untagged draft release found for $TAG after 10 attempts"
          fi

  # Build + codesign + upload release binaries for every target. Runs
  # only when `release-plz-release` actually cut a release. The upload
  # workflow is a reusable `workflow_call` so the matrix lives in one
  # place.
  upload-assets:
    name: Upload assets
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.tag != '' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-plz-release.outputs.tag }}
    secrets: inherit

  # Flip the draft release to non-draft once assets are uploaded.
  # `always()` means we still publish the release even if one target
  # in the upload matrix failed — a partial-asset release is better
  # than a permanent draft once crates.io has already been updated.
  publish-release:
    name: Publish release
    needs: [release-plz-release, upload-assets]
    if: ${{ always() && needs.release-plz-release.outputs.tag != '' && needs.release-plz-release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
          TAG: ${{ needs.release-plz-release.outputs.tag }}
        run: |
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false

  # Replace the raw git-cliff-style body with a communique-generated
  # narrative release note. If communique fails, fail the workflow so
  # the broken release-note generation is visible and actionable.
  enhance-release:
    name: Enhance release notes
    needs: [release-plz-release, publish-release]
    if: ${{ needs.release-plz-release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.release-plz-release.outputs.tag }}
          submodules: recursive
      - uses: jdx/mise-action@v2
        with:
          install_args: communique
      - name: Enhance GitHub release with communique
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAG: ${{ needs.release-plz-release.outputs.tag }}
        run: |
          communique generate "$TAG" --github-release
      - name: Append en.dev sponsor blurb
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
          TAG: ${{ needs.release-plz-release.outputs.tag }}
        run: |
          {
            gh release view "$TAG" --json body --jq .body
            cat <<'EOF'

          ## 💚 Sponsor aube

          aube is part of [**en.dev**](https://en.dev) — an independent developer-tooling studio run by [@jdx](https://github.com/jdx), also behind [mise](https://mise.jdx.dev/). Work on aube is funded entirely by sponsors.

          If aube is saving your team install time or CI minutes, please consider [sponsoring at en.dev](https://en.dev). Individual and company sponsorships are what keep the project fast, free, and independent.
          EOF
          } > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md

  # On every push to main: keep a running "chore: release" PR open with
  # the next version bump + regenerated CHANGELOG. Merging the PR is
  # what triggers the `release-plz-release` branch above on the next
  # push.
  #
  # We drive the `release-plz` CLI directly (rather than using
  # `release-plz/action`) so the bump + docs regeneration + PR open
  # happen in a single push: `release-plz update` writes the Cargo.toml
  # / Cargo.lock / CHANGELOG.md bumps locally, we then regenerate
  # `aube.usage.kdl` and the CLI docs against the new version, and only
  # then do we commit and push the whole thing. One push means CI
  # (Buildkite, windows, autofix) never sees an intermediate tree with
  # an out-of-date `aube.usage.kdl`.
  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUBE_GH_TOKEN }}
          submodules: recursive
      # MISE_LOCKED=1 makes `mise install` fail if the committed
      # mise.lock doesn't already pin the current platform's URL, instead
      # of silently re-resolving `"latest"` pins and rewriting mise.lock.
      # release-plz refuses to run against a dirty tree, and intentional
      # lockfile bumps should land via their own PR.
      - uses: jdx/mise-action@v2
        env:
          MISE_LOCKED: "1"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: release-plz
      - name: Configure git identity
        run: |
          git config user.name "release-plz[bot]"
          git config user.email "release-plz+bot@users.noreply.github.com"
          git fetch --tags origin

      # Step 1: let release-plz compute the next workspace version and
      # write Cargo.toml / Cargo.lock / CHANGELOG.md bumps into the
      # working tree. `bump=true` iff release-plz actually produced a
      # version-bump diff; the downstream regen steps run on every push
      # regardless so bench + docs refreshes flow through the release
      # PR on any change to main, not just release-worthy ones.
      - name: Apply version bumps
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
        run: |
          release-plz update
          # `git status --porcelain` catches both modified tracked files
          # and untracked ones. `git diff --quiet` alone would miss a
          # brand-new CHANGELOG.md that release-plz created for a crate
          # whose changelog didn't exist before.
          if [ -z "$(git status --porcelain)" ]; then
            echo "No version bumps needed; regen steps will still run."
            echo "bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "bump=true" >> "$GITHUB_OUTPUT"
          fi
          VERSION=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "aube") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      # Step 2: regenerate `aube.usage.kdl` + docs against the current
      # workspace version. `render` depends on `build`, so cargo builds
      # here.
      - name: Regenerate CLI docs
        run: "mise run render ::: lint-fix"

      # Refresh benchmarks/results.json and the README ratios. Hermetic
      # Verdaccio + throttle proxy (wired in the mise task), so numbers
      # are reproducible across runners. The registry cache is
      # persisted so only the first run per cache key has to fetch
      # packages from npmjs.
      - name: Restore hermetic bench registry cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/aube-bench/registry
          key: aube-bench-registry-${{ runner.os }}-v1
      - name: Refresh benchmarks
        run: mise run bench:bump

      # Bump release.json so the docs homepage's "Released at" line
      # tracks the new version. Only runs on real version bumps — on a
      # no-bump refresh the version is unchanged, and rewriting the
      # file just to reset `releasedAt` would create spurious diffs on
      # every push.
      - name: Bump release.json
        if: steps.update.outputs.bump == 'true'
        env:
          VERSION: ${{ steps.update.outputs.version }}
        run: |
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq --arg v "$VERSION" --arg d "$RELEASED_AT" \
            '.version = $v | .releasedAt = $d' release.json > release.json.tmp
          mv release.json.tmp release.json

      # Step 3: only proceed if at least one of the regen steps (or
      # release-plz update itself) actually changed the tree. A clean
      # tree means nothing is worth PR-ing.
      - name: Check for regen diff
        id: dirty
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Nothing regenerated, skipping PR update."
            echo "dirty=false" >> "$GITHUB_OUTPUT"
          else
            echo "dirty=true" >> "$GITHUB_OUTPUT"
          fi

      # Step 4: reuse an existing open release-plz PR's branch name (so
      # the PR number is preserved across runs), or mint a fresh
      # timestamped branch. Matches release-plz's own default branch
      # prefix of `release-plz-`.
      - name: Find existing release-plz PR
        if: steps.dirty.outputs.dirty == 'true'
        id: find_pr
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
        run: |
          EXISTING=$(gh pr list --state open \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("release-plz-"))][0] // empty')
          if [ -n "$EXISTING" ]; then
            BRANCH=$(echo "$EXISTING" | jq -r .headRefName)
            PR_NUMBER=$(echo "$EXISTING" | jq -r .number)
          else
            BRANCH="release-plz-$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
            PR_NUMBER=""
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      # Step 5: one commit, one push. Commit subject tracks whether
      # this PR carries a version bump or is a pure regen refresh.
      - name: Commit and push
        if: steps.dirty.outputs.dirty == 'true'
        env:
          BRANCH: ${{ steps.find_pr.outputs.branch }}
          BUMP: ${{ steps.update.outputs.bump }}
          TAG: ${{ steps.update.outputs.tag }}
        run: |
          if [ "$BUMP" = "true" ]; then
            MSG="chore: release ${TAG}"
          else
            MSG="chore: refresh generated artifacts"
          fi
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "$MSG"
          git push --force-with-lease -u origin "$BRANCH"

      # Step 6: open the PR if it's new, or refresh its title if an
      # existing one is being reused. We keep the body minimal — the
      # diff tab and CHANGELOG.md show the full picture, and
      # communique-generated narrative notes run on the actual release
      # in `enhance-release` above, not here.
      - name: Create or update PR
        if: steps.dirty.outputs.dirty == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.AUBE_GH_TOKEN }}
          BRANCH: ${{ steps.find_pr.outputs.branch }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          BUMP: ${{ steps.update.outputs.bump }}
          TAG: ${{ steps.update.outputs.tag }}
        run: |
          if [ "$BUMP" = "true" ]; then
            TITLE="chore: release ${TAG}"
            cat > /tmp/pr_body.md <<EOF
          ## 🤖 New release: \`${TAG}\`

          This PR bumps the workspace to \`${TAG}\` and regenerates CHANGELOG entries, \`aube.usage.kdl\`, the CLI docs, and the benchmark results.

          See the diff for the full set of changes, or the per-crate \`CHANGELOG.md\` files for the release notes that will ship.

          ---
          Generated by the \`release-plz-pr\` workflow.
          EOF
          else
            TITLE="chore: refresh generated artifacts"
            cat > /tmp/pr_body.md <<EOF
          ## 🤖 Refreshed generated artifacts

          No version bump pending, but one or more regenerated files drifted against main (CLI docs, benchmark results, README ratios). This PR keeps them in sync.

          ---
          Generated by the \`release-plz-pr\` workflow.
          EOF
          fi
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file /tmp/pr_body.md
          else
            gh pr create --base main --head "$BRANCH" \
              --title "$TITLE" --body-file /tmp/pr_body.md
          fi
