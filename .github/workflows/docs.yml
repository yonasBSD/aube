name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "aube.usage.kdl"
      - "crates/**"
      - "Cargo.lock"
      - "benchmarks/results.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - name: Build aube
        run: cargo build --release
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Render CLI docs from usage spec
        run: |
          ./target/release/aube usage > aube.usage.kdl
          rm -rf docs/cli && mkdir -p docs/cli
          usage g markdown -mf aube.usage.kdl --out-dir docs/cli --url-prefix /cli
          usage g json     -f aube.usage.kdl > docs/cli/commands.json
      - name: Build docs site with aube
        run: |
          cd docs
          ../target/release/aube install
          ../target/release/aube run docs:build
          touch .vitepress/dist/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
