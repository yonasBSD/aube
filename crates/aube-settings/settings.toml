sources.env = []
sources.npmrc = ["fetch-retry-factor", "fetchRetryFactor"]
examples = []

[fetchRetryMintimeout]
description = "Minimum retry timeout in milliseconds."
type = "int"
default = "10000"
docs = "Lower bound on the computed retry backoff. See `fetchRetryFactor`."
