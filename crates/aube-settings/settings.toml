sources.env = []
sources.npmrc = ["fetch-retry-mintimeout", "fetchRetryMintimeout"]
examples = []

[fetchRetryMaxtimeout]
description = "Maximum retry timeout in milliseconds."
type = "int"
default = "60000"
docs = "Upper bound on the computed retry backoff. See `fetchRetryFactor`."
